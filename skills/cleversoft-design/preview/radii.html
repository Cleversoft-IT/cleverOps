<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radii</title></head>
<body><div class="card-root">
  <div class="microlabel" style="margin-bottom:14px"><span class="dot"></span>&nbsp; CORNER RADII — BASE 10px</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:90px;height:66px;background:#fafafa;border:1px solid #e4e4e7;border-radius:6px"></div>
      <div class="mono" style="font-size:11px;color:#27272a">sm</div>
      <div class="mono" style="font-size:10px;color:#a1a1aa">6px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:90px;height:66px;background:#fafafa;border:1px solid #e4e4e7;border-radius:8px"></div>
      <div class="mono" style="font-size:11px;color:#27272a">md</div>
      <div class="mono" style="font-size:10px;color:#a1a1aa">8px · buttons</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:90px;height:66px;background:#fafafa;border:1px solid #e4e4e7;border-radius:10px"></div>
      <div class="mono" style="font-size:11px;color:#27272a">lg</div>
      <div class="mono" style="font-size:10px;color:#a1a1aa">10px · cards</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:90px;height:66px;background:#fafafa;border:1px solid #e4e4e7;border-radius:14px"></div>
      <div class="mono" style="font-size:11px;color:#27272a">xl</div>
      <div class="mono" style="font-size:10px;color:#a1a1aa">14px · large</div>
    </div>
  </div>
</div></body></html>
