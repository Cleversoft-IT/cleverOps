<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Brand color</title></head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:200px 1fr 1fr 1fr;gap:12px;align-items:stretch">
    <div style="background:#ff4017;border-radius:10px;padding:16px;color:white;min-height:140px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="mono" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;opacity:.85">Brand</div>
      <div>
        <div class="mono" style="font-size:20px;font-weight:600">#FF4017</div>
        <div class="mono" style="font-size:11px;opacity:.85;margin-top:2px">--brand</div>
      </div>
    </div>
    <div style="background:#ff6640;border-radius:10px;padding:16px;color:white;display:flex;flex-direction:column;justify-content:space-between">
      <div class="mono" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;opacity:.85">Light</div>
      <div class="mono" style="font-size:14px;font-weight:600">#FF6640</div>
    </div>
    <div style="background:#e63610;border-radius:10px;padding:16px;color:white;display:flex;flex-direction:column;justify-content:space-between">
      <div class="mono" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;opacity:.85">Dark</div>
      <div class="mono" style="font-size:14px;font-weight:600">#E63610</div>
    </div>
    <div style="border:1px solid #e4e4e7;border-radius:10px;padding:16px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="microlabel">In use</div>
      <div>
        <div class="mono" style="font-size:24px;color:#27272a;font-weight:600">ciao<span class="cursor-blink">_</span></div>
        <div class="mono" style="font-size:11px;color:#71717a;margin-top:4px"><span class="dot"></span>&nbsp;BULLET · DOT</div>
      </div>
    </div>
  </div>
</div></body></html>
