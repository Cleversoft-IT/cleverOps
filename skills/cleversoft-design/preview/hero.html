<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Hero preview</title></head>
<body><div class="card-root" style="width:900px;padding:0">
  <div style="background:#f0f0f0;border:1px solid #e4e4e7;border-radius:14px;padding:40px 48px;position:relative;overflow:hidden">
    <!-- tiny top meta row -->
    <div class="row" style="justify-content:space-between;margin-bottom:56px">
      <img src="../assets/akkaz-wordmark-light.svg" style="height:22px" alt="akkaz.dev"/>
      <div class="row" style="gap:18px">
        <span class="mono" style="font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:.1em">cosa faccio</span>
        <span class="mono" style="font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:.1em">progetti</span>
        <span class="mono" style="font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:.1em">contatti</span>
      </div>
    </div>

    <div class="microlabel" style="margin-bottom:18px;color:#ff4017"><span class="dot"></span>&nbsp; OPEN TO WORK · Q1 2026</div>
    <div class="mono" style="font-size:56px;font-weight:600;letter-spacing:-0.02em;color:#27272a;line-height:1.02;max-width:720px">
      Costruisco prodotti<br/>con l'AI<span class="cursor-blink">_</span>
    </div>
    <div class="sans" style="font-size:18px;line-height:1.55;color:#71717a;margin-top:18px;max-width:560px">
      Full-stack developer + AI engineer. Trasformo idee in MVP funzionanti in 2–6 settimane — web app, assistants, automazioni.
    </div>

    <!-- chat composer as hero CTA -->
    <div style="margin-top:32px;background:white;border:1px solid #e4e4e7;border-radius:14px;padding:4px;max-width:640px;box-shadow:0 1px 2px rgba(0,0,0,0.03)">
      <div class="row" style="gap:10px;padding:12px 16px">
        <span style="width:6px;height:6px;border-radius:999px;background:#ff4017;flex-shrink:0"></span>
        <div class="mono" style="font-size:14px;color:#27272a;flex:1">Raccontami il tuo progetto<span class="cursor-blink">_</span></div>
        <button class="mono" style="font-size:12px;background:#27272a;color:white;border:none;border-radius:8px;padding:8px 14px">Invia ↵</button>
      </div>
    </div>
    <div class="row" style="gap:8px;margin-top:14px;flex-wrap:wrap">
      <span class="mono" style="font-size:12px;background:white;border:1px solid #e4e4e7;border-radius:999px;padding:6px 12px;color:#71717a">Voglio un MVP</span>
      <span class="mono" style="font-size:12px;background:white;border:1px solid #e4e4e7;border-radius:999px;padding:6px 12px;color:#71717a">Un assistant RAG</span>
      <span class="mono" style="font-size:12px;background:white;border:1px solid #e4e4e7;border-radius:999px;padding:6px 12px;color:#71717a">Automatizzare processi</span>
    </div>
  </div>
</div></body></html>
