<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons</title></head>
<body><div class="card-root">
  <div class="microlabel" style="margin-bottom:14px"><span class="dot"></span>&nbsp; BUTTONS</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px 20px;align-items:center">
    <div style="display:flex;flex-direction:column;gap:8px">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:500;background:#ff4017;color:white;border:none;border-radius:8px;padding:10px 16px;cursor:pointer">Vediamoci →</button>
      <div class="mono" style="font-size:10px;color:#a1a1aa">Primary · brand bg · mono · 14px/500</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button style="font-family:var(--font-mono);font-size:14px;font-weight:500;background:white;color:#27272a;border:1px solid #e4e4e7;border-radius:8px;padding:10px 16px;cursor:pointer">Vedi progetti</button>
      <div class="mono" style="font-size:10px;color:#a1a1aa">Secondary · outlined · zinc-200 border</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button style="font-family:var(--font-mono);font-size:12px;font-weight:500;background:#27272a;color:white;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;width:max-content">Invia ↵</button>
      <div class="mono" style="font-size:10px;color:#a1a1aa">Small / chat send · 12px · zinc-800</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <a style="font-family:var(--font-mono);font-size:13px;color:#ff4017;text-decoration:none;border-bottom:1px dashed #ff4017;width:max-content;padding-bottom:1px">leggi tutto →</a>
      <div class="mono" style="font-size:10px;color:#a1a1aa">Text link · dashed underline · brand</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button style="font-family:var(--font-mono);font-size:12px;background:transparent;color:#71717a;border:1px dashed #d4d4d8;border-radius:6px;padding:6px 10px;cursor:pointer;width:max-content">+ aggiungi tag</button>
      <div class="mono" style="font-size:10px;color:#a1a1aa">Dashed · add action</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button style="font-family:var(--font-mono);font-size:12px;background:#fafafa;color:#a1a1aa;border:1px solid #e4e4e7;border-radius:8px;padding:8px 12px;cursor:not-allowed;width:max-content">In arrivo</button>
      <div class="mono" style="font-size:10px;color:#a1a1aa">Disabled · zinc-50 bg</div>
    </div>
  </div>
</div></body></html>
