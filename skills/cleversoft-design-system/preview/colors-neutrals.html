<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Neutrals</title></head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:4px">
    <!-- swatches zinc 50..950 -->
    <div style="background:#fafafa;border:1px solid #e4e4e7;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#f4f4f5;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#e4e4e7;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#d4d4d8;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#a1a1aa;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#71717a;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#52525b;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#3f3f46;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#27272a;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#18181b;aspect-ratio:1;border-radius:6px"></div>
    <div style="background:#09090b;aspect-ratio:1;border-radius:6px"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:4px;margin-top:6px">
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">50</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">100</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">200</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">300</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">400</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">500</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">600</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">700</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">800</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">900</div>
    <div class="mono" style="font-size:9px;text-align:center;color:#71717a">950</div>
  </div>
  <div style="display:flex;gap:8px;margin-top:18px;align-items:stretch">
    <div style="flex:1;background:#f0f0f0;border:1px solid #e4e4e7;border-radius:10px;padding:14px">
      <div class="microlabel" style="margin-bottom:4px">Light bg</div>
      <div class="mono" style="font-size:13px;color:#27272a">#f0f0f0</div>
      <div class="mono" style="font-size:10px;color:#71717a">--background</div>
    </div>
    <div style="flex:1;background:#09090b;border-radius:10px;padding:14px;color:white">
      <div class="mono" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#a1a1aa;margin-bottom:4px">Dark bg</div>
      <div class="mono" style="font-size:13px">zinc-950</div>
      <div class="mono" style="font-size:10px;color:#a1a1aa">--background (dark)</div>
    </div>
  </div>
</div></body></html>
