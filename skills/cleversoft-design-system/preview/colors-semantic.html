<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Semantic colors</title></head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <!-- light -->
    <div>
      <div class="microlabel" style="margin-bottom:8px"><span class="dot"></span>&nbsp; LIGHT</div>
      <div style="border:1px solid #e4e4e7;border-radius:10px;padding:14px;background:#f0f0f0">
        <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 10px;font-size:11px" class="mono">
          <div style="width:16px;height:16px;background:#f0f0f0;border:1px solid #d4d4d8;border-radius:4px"></div><div>bg <span style="color:#71717a">· #f0f0f0</span></div>
          <div style="width:16px;height:16px;background:#ffffff;border:1px solid #d4d4d8;border-radius:4px"></div><div>card <span style="color:#71717a">· #fff</span></div>
          <div style="width:16px;height:16px;background:#27272a;border-radius:4px"></div><div>fg · zinc-800</div>
          <div style="width:16px;height:16px;background:#71717a;border-radius:4px"></div><div>muted-fg · zinc-500</div>
          <div style="width:16px;height:16px;background:#e4e4e7;border-radius:4px"></div><div>border · zinc-200</div>
          <div style="width:16px;height:16px;background:#ff4017;border-radius:4px"></div><div>brand · #ff4017</div>
        </div>
      </div>
    </div>
    <div>
      <div class="microlabel" style="margin-bottom:8px;color:#a1a1aa"><span class="dot"></span>&nbsp; DARK</div>
      <div style="border:1px solid #27272a;border-radius:10px;padding:14px;background:#09090b;color:#fafafa">
        <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 10px;font-size:11px" class="mono">
          <div style="width:16px;height:16px;background:#09090b;border:1px solid #3f3f46;border-radius:4px"></div><div>bg · zinc-950</div>
          <div style="width:16px;height:16px;background:#18181b;border:1px solid #3f3f46;border-radius:4px"></div><div>card · zinc-900</div>
          <div style="width:16px;height:16px;background:#fafafa;border-radius:4px"></div><div>fg · zinc-50</div>
          <div style="width:16px;height:16px;background:#a1a1aa;border-radius:4px"></div><div>muted-fg · zinc-400</div>
          <div style="width:16px;height:16px;background:rgba(255,255,255,0.1);border-radius:4px"></div><div>border · white/10</div>
          <div style="width:16px;height:16px;background:#ff5a33;border-radius:4px"></div><div>brand · #ff5a33</div>
        </div>
      </div>
    </div>
  </div>
</div></body></html>
